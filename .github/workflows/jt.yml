# .github/workflows/update-m3u.yml

name: Auto Update M3U

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Requests
        run: pip install requests

      - name: Generate Full Playlist + Add Star Sports
        env:
          API_URL: ${{ secrets.API_URL }}
          STAR_JSON_URL: ${{ secrets.STAR_JSON_URL }}
          STAR_COOKIE_URL: ${{ secrets.STAR_COOKIE_URL }}
          SONY_COOKIE_URL: ${{ secrets.SONY_COOKIE_URL }}
        run: |
          python <<EOF
          import os, requests

          def safe_get_json(url):
              try:
                  r = requests.get(url, timeout=60)
                  if r.status_code != 200 or not r.text.strip():
                      return []
                  return r.json()
              except:
                  return []

          api_url = os.environ["API_URL"]
          star_json_url = os.environ["STAR_JSON_URL"]
          star_cookie_url = os.environ["STAR_COOKIE_URL"]
          sony_cookie_url = os.environ["SONY_COOKIE_URL"]

          main_data = safe_get_json(api_url)
          star_data = safe_get_json(star_json_url)
          cookie_data = safe_get_json(star_cookie_url)
          sony_cookie_data = safe_get_json(sony_cookie_url)

          lines = ['#EXTM3U']
          used = set()

          def add_channel(ch, force_group=None):
              name = ch.get("channel_name") or ch.get("name") or "Unknown"
              logo = ch.get("channel_logo") or ch.get("logo") or ""
              gid = ch.get("channel_id") or ch.get("id") or ""
              group = (
                  force_group
                  or ch.get("channel_genre")
                  or ch.get("category")
                  or "Live TV"
              )
              stream = ch.get("channel_url") or ch.get("url") or ""
              kid = ch.get("keyId","")
              key = ch.get("key","")

              if not stream or stream in used:
                  return

              used.add(stream)

              lines.append(
                  f'#EXTINF:-1 tvg-id="{gid}" tvg-logo="{logo}" group-title="{group}",{name}'
              )

              if kid not in ["", "null", None] and key not in ["", "null", None]:
                  lines.append("#KODIPROP:inputstream.adaptive.license_type=clearkey")
                  lines.append(
                      f"#KODIPROP:inputstream.adaptive.license_key={kid}:{key}"
                  )

              lines.append(stream)
              lines.append("")

          # STEP 1: All channels
          for ch in main_data:
              add_channel(ch)

          # Star cookie map
          cookie_map = {}
          if isinstance(cookie_data, dict):
              for item in cookie_data.get("successful_results", []) + cookie_data.get("failed_results", []):
                  cid = str(item.get("channel_id", "")).strip()
                  furl = item.get("error_details", {}).get("final_url", "") or item.get("channel_url", "")
                  if cid and furl:
                      cookie_map[cid] = furl

          # STEP 2: Star Sports
          for ch in star_data:
              name = (ch.get("channel_name") or ch.get("name") or "").lower()
              cid = str(ch.get("channel_id") or ch.get("id") or "").strip()

              if "star sports" in name:
                  if cid in cookie_map:
                      ch["channel_url"] = cookie_map[cid]
                  add_channel(ch, force_group="Sports")

          # ===== SONY SAB FINAL FIX =====

          sony_cookie_map = {}
          if isinstance(sony_cookie_data, dict):
              for item in sony_cookie_data.get("successful_results", []) + sony_cookie_data.get("failed_results", []):
                  cid = str(item.get("channel_id", "")).strip()

                  furl = (
                      item.get("error_details", {}).get("final_url") or
                      item.get("final_url") or
                      item.get("url") or
                      item.get("channel_url") or
                      ""
                  )

                  if cid and furl:
                      sony_cookie_map[cid] = furl

          sony_channel = {
              "name": "Sony SAB SD",
              "id": "154",
              "category": "Entertainment",
              "url": "",
              "keyId": "ba4d9b38517552de9654d3652d27933b",
              "key": "31e7cbf3d289d3116386457ed8bac3a2",
              "logo": "https://jiotvimages.cdn.jio.com/dare_images/images/Sony_SAB.png"
          }

          # ONLY add if cookie exists (force cookie usage)
          if "154" in sony_cookie_map:
              sony_channel["url"] = sony_cookie_map["154"]
              add_channel(sony_channel, force_group="Entertainment")

          # ===== END =====

          with open("jtv.m3u", "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          EOF

      - name: Commit Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jtv.m3u
          git commit -m "Auto update full playlist with Star Sports" || echo "No changes"
          git push
