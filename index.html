<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FANCODE EVENTS</title>

<meta name="theme-color" content="#050b18">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<script src="https://polyfill.io/v3/polyfill.min.js?features=default,Array.prototype.includes,Object.assign,Promise,fetch"></script>

<style>
:root{
  --bg:#050b18;--card:#0b162c;--accent:#e11d48;
  --live:#e11d48;--upcoming:#f59e0b;
  --text:#e5e7eb;--muted:#94a3b8;
  --priority:#facc15;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:radial-gradient(circle at top,#0b1633,#050b18 70%);
  color:var(--text);
  -webkit-overflow-scrolling: touch;
}
@media screen and (min-width:1920px){
  body{padding:20px}
  .card{transform:scale(1.02)}
}
header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  padding:22px 20px;
  cursor:pointer;
}
header span{
  font-size:26px;
  font-weight:700;
  letter-spacing:1px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
  padding:0 20px 14px;
}
.stat{
  background:linear-gradient(135deg,#0b162c,#111c3a);
  padding:18px;
  border-radius:14px;
  text-align:center;
}
.stat span{color:var(--muted);font-size:14px}
.stat h2{margin:8px 0 0;font-size:32px}
.type-filter{
  display:flex;
  gap:10px;
  justify-content:center;
  padding:0 20px 14px;
}
.type-filter button{
  background:#0b162c;
  border:none;
  color:var(--text);
  padding:10px 20px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
}
.type-filter button.active{
  background:var(--accent);
}
.filters{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:0 20px 16px;
}
.filters select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#0b162c;
  color:#fff;
  font-weight:600;
  appearance:none;
  text-align:center;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:20px;
  padding:0 20px 40px;
}
.card{
  background:var(--card);
  border-radius:18px;
  overflow:hidden;
}
.card img{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
  background:#111c3a;
}
.card-body{padding:16px}
.badge{
  display:inline-block;
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  margin-bottom:6px;
}
.upcoming{background:rgba(245,158,11,.15);color:var(--upcoming)}
.badge.live{
  background:rgba(225,29,72,.18);
  color:#fb7185;
  font-weight:700;
}
.title{font-weight:600}
.tournament{color:var(--muted);font-size:14px}
.meta{margin-top:6px;font-size:13px;color:var(--muted)}
button:focus,select:focus,.card:focus{
  outline:4px solid var(--priority);
  transform:scale(1.02);
}
</style>
</head>

<body>

<header onclick="location.reload()">
  <span>⚡𝗙𝗔𝗡𝗖𝗢𝗗𝗘 𝗘𝗩𝗘𝗡𝗧𝗦 𝗕𝗬 𝗗𝗛𝗥𝗨𝗩⚡</span>
</header>

<section class="stats">
  <div class="stat"><span>Total</span><h2 id="total">0</h2></div>
  <div class="stat"><span>Live</span><h2 id="live">0</h2></div>
  <div class="stat"><span>Upcoming</span><h2 id="upcoming">0</h2></div>
</section>

<div class="type-filter">
  <button class="active" onclick="setType('ALL')">TOTAL</button>
  <button onclick="setType('LIVE')">LIVE</button>
  <button onclick="setType('UPCOMING')">UPCOMING</button>
</div>

<div class="filters">
  <select id="categoryFilter" onchange="render()">
    <option value="ALL">CATEGORIES</option>
  </select>
  <select id="tournamentFilter" onchange="render()">
    <option value="ALL">TOURNAMENTS</option>
  </select>
</div>

<section class="grid" id="events"></section>

<script>
const API='https://fanco.vodep39240327.workers.dev/';
let allMatches=[],currentType='ALL';

async function loadEvents(){
  const res=await fetch(API);
  const data=await res.json();

  allMatches=Array.isArray(data)?data:data.matches||[];

  const totalCount=allMatches.length;
  const liveCount=allMatches.filter(m=>m.status==='LIVE').length;
  const upcomingCount=totalCount-liveCount;

  total.textContent=totalCount;
  live.textContent=liveCount;
  upcoming.textContent=upcomingCount;

  buildFilters();
  render();
}

function buildFilters(){
  const catSel=categoryFilter;
  const tourSel=tournamentFilter;
  catSel.innerHTML='<option value="ALL">CATEGORIES</option>';
  tourSel.innerHTML='<option value="ALL">TOURNAMENTS</option>';

  [...new Set(allMatches.map(m=>m.event_category))]
    .forEach(c=>catSel.innerHTML+=`<option>${c}</option>`);

  [...new Set(allMatches.map(m=>m.event_name))]
    .forEach(t=>tourSel.innerHTML+=`<option>${t}</option>`);
}

function setType(t){
  currentType=t;
  document.querySelectorAll('.type-filter button')
    .forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render(){
  events.innerHTML='';
  for(const m of allMatches){

    if(currentType==='LIVE' && m.status!=='LIVE') continue;
    if(currentType==='UPCOMING' && m.status==='LIVE') continue;

    const liveNow=m.status==='LIVE';

    events.innerHTML+=`
    <div class="card" tabindex="0"
      onclick="location.href='player.html?id=${m.match_id}'">
      <img src="${m.src}">
      <div class="card-body">
        <span class="badge ${liveNow?'live':'upcoming'}">
          ${liveNow?'LIVE':'UPCOMING'}
        </span>
        <div class="title">${m.match_name}</div>
        <div class="tournament">${m.event_name}</div>
        <div class="meta">${m.event_category} • ${m.startTime}</div>
        <div class="meta">${m.team_1} vs ${m.team_2}</div>
        <div class="meta">Language: ${m['language-tag']}</div>
      </div>
    </div>`;
  }
}

loadEvents();
setInterval(loadEvents,60000);
</script>

</body>
</html>
