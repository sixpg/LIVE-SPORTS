<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Player</title>
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#000;width:100%;height:100%;font-family:system-ui,sans-serif}
body{position:absolute;color:#fff;display:flex;justify-content:center;align-items:flex-start}
.video-container{position:absolute;width:100%;height:100%;aspect-ratio:16/9;background:#000;overflow:hidden}
video{width:100%;height:100%;background:#000}
</style>
</head>

<body>

<div class="video-container">
<video id="video" autoplay muted playsinline preload="auto" controls></video>
</div>

<script>

const params = new URLSearchParams(window.location.search)

let streamUrl = params.get('url')
const id = params.get('id')

/* JSON SOURCE */
const jsonSource = "https://fanco.vodep39240327.workers.dev/"

/* PROXY */
const proxy = "https://cors-proxy.cooks.fyi/"

async function resolveStream(){

if(streamUrl) return streamUrl

if(!id) return null

try{

const res = await fetch(jsonSource)
const data = await res.json()

if(data.matches){

const match = data.matches.find(m => m.match_id == id)

if(match && match.adfree_url){
return match.adfree_url
}

}

}catch(e){
console.error("JSON error",e)
}

return null

}

const video=document.getElementById('video')

async function initializePlayer(){

try{

streamUrl = await resolveStream()

if(!streamUrl){
console.error("Stream not found")
return
}

/* APPLY PROXY */
streamUrl = proxy + streamUrl

if(Hls.isSupported()){

const hls = new Hls({
enableWorker:true,
lowLatencyMode:true,
backBufferLength:30
})

hls.loadSource(streamUrl)

hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play().catch(()=>{})
})

}else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src = streamUrl
video.play().catch(()=>{})

}

}catch(err){

console.error(err)

video.src = streamUrl
video.play().catch(()=>{})

}

}

document.addEventListener('DOMContentLoaded',()=>initializePlayer())

</script>

</body>
</html>
